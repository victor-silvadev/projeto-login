<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="stylePC.css">
</head>
<body>

    <main>
        <section id="login">
            <div class="imagem">
                    <h1>Ola!</h1>
                <div class="P">
                    <p>Seja bem-vindo(a) novamente. Faça login para acessar sua conta e poder fazer as configuraçoes no seu ambiente</p>
                </div>
            </div>

            <div class="formulario">
                <h1>Login</h1>

                <div class="redes-sociais">
                    <a href=""><img src="./imagens/facebook.png" alt="logo-facebook"></a>
                    <a href=""><img src="./imagens/google.png" alt="logo-google"></a>
                    <a href=""><img src="./imagens/github.png" alt="logo-github"></a>
                </div>

                <form action="login.php" method="post">
                    <div class="usuario">
                        <i class="material-symbols-outlined">Person</i>
                            <input type="email" name="email" id="email" placeholder="seu e-mail" required  minlength="10">
                        <label for="email"></label>
                    </div>

                    <div class="usuario">
                        <i class="material-symbols-outlined">Lock</i>
                            <input type="password" name="senha" id="senha" placeholder="sua senha" required minlength="8">
                        <label for="senha"></label>
                    </div>

                    <input type="submit" value="entrar" class="btn"> <br> 

                    <div class="link">
                        <a href="#" class="link1">Eesqueceu senha:</a> <span> | </span>
                        <a href="#" class="link1">Criar conta:</a>
                    </div>
                </form>
            </div>
        </section>
    </main>

</body>
</html>
