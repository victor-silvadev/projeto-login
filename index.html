<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="stylePC.css">
</head>
<body>

    <main>
        <section id="login">
            <div class="imagem">
                    <h1>Ola!</h1>
                <div class="P">
                    <p>Seja bem-vindo(a) novamente. Faça login para acessar sua conta e poder fazer as configuraçoes no seu ambiente</p>
                </div>
            </div>

            <div class="formulario">
                <div class="bloco-login">
                    <h1>Login</h1>
                    <div class="redes-sociais">
                        <a href="https://www.facebook.com/?locale=pt_BR" target="_blank"><img src="./imagens/facebook.png" alt="logo-facebook"></a>
                        <a href="https://keep.google.com/u/0/#NOTE/1VpZrMUPH4K1qWB_R7MHwf1-8uVe8WUZe2c_opnFUgQvAPcKouBhvbXTPjKnc" target="_blank"><img src="./imagens/google.png" alt="logo-google"></a>
                        <a href="https://github.com/victor-silvadev" target="_blank"><img src="./imagens/github.png" alt="logo-github"></a>
                    </div>
                    <form action="login.php" method="post">
                        <div class="usuario">
                            <i class="material-symbols-outlined">Person</i>
                                <input type="email" name="email" id="email" placeholder="seu e-mail" required  minlength="10">
                            <label for="email"></label>
                        </div>
                        <div class="usuario">
                            <i class="material-symbols-outlined">Lock</i>
                                <input type="password" name="senha" id="senha" placeholder="sua senha" required minlength="8">
                            <label for="senha"></label>
                        </div>
                        <input type="submit" value="entrar" class="btn"> <br>
                        <div class="link">
                            <a href="https://support.google.com/accounts/answer/7682439?hl=pt-BR" target="_blank" class="link1">Eesqueceu senha:</a>  <span> | </span>
                            <a href="javascript:void(0)" class="link1" onclick="alternar()">Criar conta:</a>
                        </div>
                    </form>
                </div>
                
                <div id="bloco-cadastro" class="escondido">
                        <h1>Cadastro</h1>
                        <p>Crie sua conta para começar a configurar seu ambiente.</p>
                    
                    <form action="cadastro.php" method="post">
                        <div class="usuario">
                            <i class="material-symbols-outlined">Badge</i>
                            <input type="text" name="nome" id="nome-cad" placeholder="seu nome">
                        </div>
                        
                        <div class="usuario">
                            <i class="material-symbols-outlined">Mail</i>
                            <input type="email" name="email-cad" id="email-cad" placeholder="seu e-mail">
                        </div>
                        <div class="usuario">
                            <i class="material-symbols-outlined">Lock</i>
                            <input type="password" name="senha-cad" id="senha-cad" placeholder="crie uma senha">
                        </div>

                        <input type="submit" value="cadastrar" class="btn">

                        <div class="link">
                            <a href="javascript:void(0)" class="link1" onclick="alternar()">Já tenho conta</a>
                        </div>
                    </form>
                </div>
                
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
